<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Roblox Tracker Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Roblox Tracker — Multi‑Instance Monitor</h1>

<div id="cards" class="grid"></div>

<script>
async function loadAllStates() {
  try {
    const res = await fetch("data/");
    const text = await res.text();

    const files = [...text.matchAll(/href="(instance-[^"]+\.json)"/g)]
      .map(m => m[1]);

    const states = [];

    for (const file of files) {
      try {
        const r = await fetch("data/" + file + "?cache=" + Date.now());
        const json = await r.json();
        states.push({ id: file, data: json });
      } catch {}
    }

    renderCards(states);
  } catch (e) {
    console.error("Failed to load states", e);
  }
}

function renderCards(states) {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  states.forEach(({ id, data }) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h2>${data.game.name}</h2>
      <p><strong>Instance:</strong> ${id}</p>
      <p><strong>Place ID:</strong> ${data.placeId ?? "N/A"}</p>
      <p><strong>Job ID:</strong> ${data.jobId ?? "N/A"}</p>
      <p><strong>Genre:</strong> ${data.genre}</p>
      <p><strong>Server:</strong> ${data.serverType}</p>
      <hr>
      <p><strong>Status:</strong> ${data.state}</p>
      <p><strong>Players:</strong> ${data.players}</p>
      <p><strong>Friends:</strong> ${data.friends}</p>
      <p><strong>Hops:</strong> ${data.hops}</p>
      <p><strong>Elapsed:</strong> ${data.elapsed}</p>
      <hr>
      <p><strong>Anti‑Cheat:</strong> ${data.antiCheatStatus}</p>
      <p><strong>Detected:</strong> ${data.detectedCheats}</p>
    `;

    container.appendChild(card);
  });
}

setInterval(loadAllStates, 1000);
loadAllStates();
</script>

</body>
</html>
